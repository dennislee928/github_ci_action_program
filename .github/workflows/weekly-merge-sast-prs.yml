# Runs .github/script/merge-branch.sh sast-prs on a timer.
#
# Script behavior (see script comments): Phase 1 — PRs under your user namespace, then
# Phase 2 — each org (non-draft). Optional MERGE_SEARCH_BY_AUTHOR=1 adds --author (your PRs only).
# Merge when GitHub says mergeable; GH_SEARCH_TIMEOUT_SEC caps each search (e.g. 120).
#
# Optional secret SAST_MERGE_GITHUB_TOKEN: PAT so gh/git can merge PRs in other repos
# (classic "repo" + read:org, or fine-grained on those repos). Without it, Actions
# GITHUB_TOKEN only affects *this* repository.
#
# Optional env overrides (uncomment / set below):
#   MERGE_ONLY_SAST=1   — only titles matching Snyk/Semgrep/Husky/CodeRabbit
#   DRY_RUN=1           — list actions only
#   MERGE_ADMIN=1       — gh pr merge --admin when checks block
name: Weekly PR merge automation

on:
  workflow_dispatch:
  # 若改由 Cloudflare Worker cron 觸發（見 .github/script/cloudflare_workers/），
  # 可註解掉下方 schedule，避免與 Workers 重複執行。
  schedule:
    # Every Monday 09:00 UTC; adjust as needed.
    - cron: "0 9 * * 1"

permissions:
  contents: write        # needed for git push in conflict resolution
  pull-requests: write   # needed for gh pr merge / gh pr review via GITHUB_TOKEN

concurrency:
  group: weekly-pr-merge
  cancel-in-progress: false

jobs:
  merge_prs:
    name: merge-branch.sh sast-prs
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run PR automation script
        env:
          PAT: ${{ secrets.SAST_MERGE_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional overrides for scheduled/manual runs (edit here or use repo Variables).
          # MERGE_ONLY_SAST: "1"
          # DRY_RUN: "1"
          # GH_SEARCH_TIMEOUT_SEC: "120"
          # MERGE_SEARCH_PROGRESS_SEC: "15"   # non-verbose heartbeat during gh search; "0" = off
          # MERGE_SEARCH_BY_AUTHOR: "1"
        run: |
          set -euo pipefail
          if [ -n "${PAT:-}" ]; then
            export GH_TOKEN="$PAT"
          else
            export GH_TOKEN="$GITHUB_TOKEN"
            echo "::warning title=SAST_MERGE_GITHUB_TOKEN::Secret not set — using GITHUB_TOKEN. In Actions this usually only allows merges in this repository. Add SAST_MERGE_GITHUB_TOKEN to merge PRs in your other user/org repos."
          fi
          bash "${GITHUB_WORKSPACE}/.github/script/merge-branch.sh" sast-prs
